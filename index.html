<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Masri Dental Clinic</title><meta name="theme-color" content="#0f766e"><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script><script src="https://unpkg.com/html5-qrcode"></script></head><body><header><div><h1>Masri Dental Clinic</h1><p id="status">Loading cloud...</p></div><button id="refreshBtn">↻</button></header><nav><button class="tab active" data-page="patients">Patients</button><button class="tab" data-page="form">Add</button><button class="tab" data-page="scan">Scan QR</button></nav><main><section id="patients" class="page active"><input id="search" placeholder="Search name, phone, ID..."><div id="list"></div></section><section id="form" class="page"><h2 id="formTitle">Add Patient</h2><form id="patientForm"><input type="hidden" id="rowId"><label>Patient ID<input id="caseId" placeholder="Auto if empty"></label><label>Name<input id="name" required></label><label>Phone<input id="phone" inputmode="tel"></label><label>Age<input id="age" inputmode="numeric"></label><label>Gender<select id="gender"><option></option><option>Male</option><option>Female</option></select></label><label>Chief complaint<textarea id="chiefComplaint"></textarea></label><label>Medical alerts<textarea id="medicalAlerts"></textarea></label><label>Diagnosis<textarea id="diagnosis"></textarea></label><label>Treatment plan<textarea id="treatmentPlan"></textarea></label><label>Progress notes<textarea id="progressNotes"></textarea></label><div class="photoBox"><h3>Photos / X-rays</h3><input id="photos" type="file" accept="image/*" multiple><p>Photos save through Netlify proxy to cloud.</p><div id="preview" class="grid"></div></div><button id="saveBtn" class="primary" type="submit">Save Patient</button><button id="cancelBtn" class="secondary hidden" type="button">Cancel Edit</button></form></section><section id="detail" class="page"><button class="secondary" id="backBtn">← Back</button><div id="details"></div></section><section id="scan" class="page"><h2>Scan Patient QR</h2><button id="startScan" class="primary">Start Scanner</button><button id="stopScan" class="secondary hidden">Stop Scanner</button><div id="reader"></div></section></main><div id="photoModal" class="modal hidden"><button id="closePhoto">×</button><img id="bigPhoto"></div><div id="qrModal" class="modal hidden"><div class="box"><button id="closeQr">×</button><h2>Patient QR</h2><div id="qrcode"></div><p class="muted">Scan to open this patient file.</p></div></div><script src="app.js"></script></body></html>
